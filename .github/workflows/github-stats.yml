name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVG
        run: |
          STATS=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST https://api.github.com/graphql -d '
          {
            "query": "{ user(login: \"nahrinoda\") { contributionsCollection { totalCommitContributions totalPullRequestContributions totalIssueContributions totalPullRequestReviewContributions restrictedContributionsCount } repositories(ownerAffiliations: OWNER, first: 100) { nodes { stargazerCount } } } }"
          }')

          COMMITS=$(echo "$STATS" | jq '.data.user.contributionsCollection.totalCommitContributions')
          PRIVATE=$(echo "$STATS" | jq '.data.user.contributionsCollection.restrictedContributionsCount')
          TOTAL_COMMITS=$((COMMITS + PRIVATE))
          PRS=$(echo "$STATS" | jq '.data.user.contributionsCollection.totalPullRequestContributions')
          ISSUES=$(echo "$STATS" | jq '.data.user.contributionsCollection.totalIssueContributions')
          REVIEWS=$(echo "$STATS" | jq '.data.user.contributionsCollection.totalPullRequestReviewContributions')
          STARS=$(echo "$STATS" | jq '[.data.user.repositories.nodes[].stargazerCount] | add // 0')

          cat > stats.svg << SVGEOF
          <svg width="495" height="220" viewBox="0 0 495 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <style>
              .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #2f80ed; }
              .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #434d58; }
              .value { font: 700 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #333; }
              .icon { fill: #4c71f2; }
            </style>
            <rect x="0.5" y="0.5" rx="4.5" width="494" height="219" fill="#fffefe" stroke="#e4e2e2"/>
            <text x="25" y="35" class="header">Nahrin's GitHub Stats</text>
            <g transform="translate(25, 60)">
              <svg class="icon" x="0" y="0" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
              <text x="25" y="13" class="stat">Total Stars Earned:</text><text x="210" y="13" class="value">${STARS}</text>
            </g>
            <g transform="translate(25, 88)">
              <svg class="icon" x="0" y="0" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M1.643 3.143L.427 1.927A.25.25 0 000 2.104V5.75c0 .138.112.25.25.25h3.646a.25.25 0 00.177-.427L2.715 4.215a6.5 6.5 0 11-1.18 4.458.75.75 0 10-1.493.154 8.001 8.001 0 101.6-5.684zM7.75 4a.75.75 0 01.75.75v2.992l2.028.812a.75.75 0 01-.557 1.392l-2.5-1A.75.75 0 017 8.25v-3.5A.75.75 0 017.75 4z"/></svg>
              <text x="25" y="13" class="stat">Total Commits:</text><text x="210" y="13" class="value">${TOTAL_COMMITS}</text>
            </g>
            <g transform="translate(25, 116)">
              <svg class="icon" x="0" y="0" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>
              <text x="25" y="13" class="stat">Total PRs:</text><text x="210" y="13" class="value">${PRS}</text>
            </g>
            <g transform="translate(25, 144)">
              <svg class="icon" x="0" y="0" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9-3a1 1 0 11-2 0 1 1 0 012 0zM6.92 6.085h.001a.749.749 0 11-1.342-.67c.169-.339.516-.644.932-.79.46-.162.958-.15 1.338.03.373.173.675.481.875.884.263.53.098 1.13-.272 1.555-.18.207-.39.368-.59.49-.19.117-.4.213-.573.282a.75.75 0 01-.536-1.4c.112-.043.237-.107.345-.177.104-.067.162-.123.182-.146.088-.1.033-.158-.01-.233a.398.398 0 00-.184-.178.348.348 0 00-.252-.013c-.142.05-.27.16-.325.276zM8 11a1 1 0 100-2 1 1 0 000 2z"/></svg>
              <text x="25" y="13" class="stat">Total Issues:</text><text x="210" y="13" class="value">${ISSUES}</text>
            </g>
            <g transform="translate(25, 172)">
              <svg class="icon" x="0" y="0" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M1.5 2.75a.25.25 0 01.25-.25h8.5a.25.25 0 01.25.25v5.5a.25.25 0 01-.25.25h-3.5a.75.75 0 00-.53.22L3.5 11.44V9.25a.75.75 0 00-.75-.75h-1a.25.25 0 01-.25-.25v-5.5zM1.75 1A1.75 1.75 0 000 2.75v5.5C0 9.216.784 10 1.75 10H2v1.543a1.457 1.457 0 002.487 1.03L7.061 10h3.189A1.75 1.75 0 0012 8.25v-5.5A1.75 1.75 0 0010.25 1h-8.5zM14.5 4.75a.25.25 0 00-.25-.25h-.5a.75.75 0 110-1.5h.5c.966 0 1.75.784 1.75 1.75v5.5A1.75 1.75 0 0114.25 12H14v1.543a1.457 1.457 0 01-2.487 1.03L9.22 12.28a.75.75 0 111.06-1.06l2.22 2.22v-2.19a.75.75 0 01.75-.75h1a.25.25 0 00.25-.25v-5.5z"/></svg>
              <text x="25" y="13" class="stat">Total Reviews:</text><text x="210" y="13" class="value">${REVIEWS}</text>
            </g>
          </svg>
          SVGEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update GitHub stats card"
          git push
